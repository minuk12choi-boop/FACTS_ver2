<div id="tipMissingListModal" class="modal hidden">
    <div class="modal-panel">
        <div class="modal-title">TIP미등록 호환Path 목록</div>
        <div class="modal-body">
            <div class="toolbar-inline" style="margin-bottom:12px;">
                <button type="button" class="btn-primary btn-sm" id="tipMissingAddNewBtn">신규 입력</button>
            </div>
            <div class="table-wrap" style="max-height:280px; overflow:auto; border:1px solid #dce8f5; border-radius:12px;">

                    <thead>
                        <tr>
                            <th>미등록TIP호환Path_상시/비상시</th>

                            <th>수정</th>

                    </thead>
                    <tbody id="tipMissingListTbody">

                    </tbody>
                </table>
            </div>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn-secondary" id="tipMissingListCloseBtn">닫기</button>
        </div>
    </div>
</div>
