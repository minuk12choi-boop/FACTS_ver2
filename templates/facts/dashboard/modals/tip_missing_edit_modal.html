{# 역할: TIP미등록 호환Path 신규/수정 입력 모달.
   필수값 검증 후 JS가 dashboardTipMissingSaveApi로 전송합니다. #}
<div id="tipMissingEditModal" class="modal hidden">
    <div class="modal-panel">
        <div class="modal-title">TIP미등록 호환Path 입력</div>
        <div class="modal-body">
            <input type="hidden" id="tipMissingEditId">
            <div class="filter-grid">
                <div>
                    <label>상시/비상시 (필수기재)</label>
                    <select id="tipMissingAlwaysEmergency">
                        <option value="">선택</option>
                        <option value="상시">상시</option>
                        <option value="비상시">비상시</option>
                    </select>
                </div>
                <div>
                    <label>주요/비주요 (필수기재)</label>
                    <select id="tipMissingMajorMinor">
                        <option value="">선택</option>
                        <option value="주요">주요</option>
                        <option value="비주요">비주요</option>
                    </select>
                </div>
                <div>
                    <label>호환EQPBODY명 (필수기재)</label>
                    <input type="text" id="tipMissingEqpBodyName">
                </div>
                <div>
                    <label>호환EQPCHAM명</label>
                    <input type="text" id="tipMissingEqpChamName">
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn-secondary" id="tipMissingCancelBtn">취소</button>
            <button type="button" class="btn-primary" id="tipMissingSaveBtn">저장</button>
        </div>
    </div>
</div>
