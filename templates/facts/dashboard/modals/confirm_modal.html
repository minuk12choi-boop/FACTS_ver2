{# 역할: 예/아니오 성격의 확인 모달.
   showFactsConfirm이 resolve(true/false) 형태로 사용합니다. #}
<div id="factsConfirmModal" class="modal hidden">
    <div class="modal-panel modal-sm">
        <div class="modal-title" id="factsConfirmTitle">FACTS의 메시지</div>
        <div class="modal-body" id="factsConfirmBody"></div>
        <div class="modal-actions">
            <button type="button" class="btn-secondary" id="factsConfirmCancelBtn">취소</button>
            <button type="button" class="btn-primary" id="factsConfirmOkBtn">확인</button>
        </div>
    </div>
</div>
